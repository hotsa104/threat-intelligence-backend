services:
  - type: web
    name: threat-intelligence-api
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NVD_API_KEY
        sync: false
      - key: GITHUB_API_TOKEN
        sync: false
      - key: X_BEARER_TOKEN
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: FRONTEND_URL
        sync: false
      - key: ENV
        value: production
      - key: FASTAPI_RELOAD
        value: "false"
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: DB_PATH
        value: /opt/render/data/ti_dashboard.db
    disk:
      name: ti-db
      mountPath: /opt/render/data
      sizeGB: 1
